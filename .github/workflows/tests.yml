name: ci

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        linter:
          - pylama aiofile tests
          - mypy aiofile tests

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: ${{ matrix.linter }}
        run: uv run ${{ matrix.linter }}

  tests:
    strategy:
      fail-fast: false

      matrix:
        include:
          - python-version: "3.10"
            os: ubuntu-latest
          - python-version: "3.11"
            os: ubuntu-latest
          - python-version: "3.12"
            os: ubuntu-latest
          - python-version: "3.13"
            os: ubuntu-latest
          - python-version: "3.14"
            os: ubuntu-latest
          - python-version: "3.11"
            os: macos-latest
          - python-version: "3.12"
            os: macos-latest
          - python-version: "3.13"
            os: macos-latest
          - python-version: "3.14"
            os: macos-latest
          - python-version: "3.10"
            os: windows-latest
          - python-version: "3.11"
            os: windows-latest
          - python-version: "3.12"
            os: windows-latest
          - python-version: "3.13"
            os: windows-latest
          - python-version: "3.14"
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: pytest
        run: uv run pytest --cov=aiofile --color=yes --cov-report=term-missing -vv tests README.md

      - name: coveralls
        run: uv run coveralls || true
        env:
          COVERALLS_PARALLEL: 'true'
          COVERALLS_SERVICE_NAME: github
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finish:
    needs:
      - tests
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.github_token }}
          parallel-finished: true
